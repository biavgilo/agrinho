<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agro Forte</title>

  <style>

    :root {
      cor principal: #2c3e50;
    }
    /*  FONTE  */
    @font-face {
      font-family: 'Bebas';
      src: url('fontes/BebasNeue-Regular.ttf') format('truetype'); 
    }

    /* ===== RESET ===== */
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html{
      scroll-behavior: smooth;
    }

    body{
      background: var(cor principal);
      overflow-x: hidden;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ===== HERO ===== */
    .hero{
      position: relative;
      height: 200vh;
    }

    /* FUNDO */
    .hero-bg{
      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100vh;

      background-image:
        linear-gradient(rgba(7,17,11,0.72), rgba(7,17,11,0.72)),
        url("img.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      filter: blur(1.5px);

      transform: scale(1.03);

      z-index: -3;

      transition:
        opacity 0.2s ease,
        transform 0.3s ease;
    }

    /* BRILHO VERDE */
    .green-glow{
      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100vh;

      background:
      radial-gradient(circle at center,
      rgba(88,255,144,0.08),
      transparent 60%);

      z-index: -2;

      pointer-events: none;
    }

    /* PARTÍCULAS */
    .particles{
      position: fixed;
      width: 100%;
      height: 100vh;

      overflow: hidden;

      z-index: -1;
      pointer-events: none;
    }

    .particle{
      position: absolute;

      width: 4px;
      height: 4px;

      background: rgba(170,255,190,0.35);

      border-radius: 50%;

      animation: float linear infinite;
    }

    @keyframes float{
      from{
        transform: translateY(100vh);
        opacity: 0;
      }

      20%{
        opacity: 1;
      }

      to{
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

    /* CONTEÚDO CENTRAL */
    .hero-content{
      position: sticky;
      top: 0;

      width: 100%;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      text-align: center;
      padding: 20px;
    }

    /* TEXTO */
    .hero-title{
      font-family: 'Bebas';

      font-size: clamp(2.5rem, 6vw, 5.5rem);

      text-transform: uppercase;

      letter-spacing: 8px;

      line-height: 1.3;

      color: white;

      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 25px rgba(0,0,0,0.7),
        0 0 50px rgba(0,0,0,0.5);

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .line1{
      margin-bottom: 10px;
    }

    .line2{
      margin-left: 120px;
    }

    /* SCROLL INDICATOR */
    .scroll-indicator{
      position: absolute;

      bottom: 40px;
      left: 50%;

      transform: translateX(-50%);

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: 10px;

      opacity: 0.8;

      animation: bounce 2s infinite;
    }

    .mouse{
      width: 28px;
      height: 48px;

      border: 2px solid white;
      border-radius: 20px;

      position: relative;
    }

    .mouse::before{
      content: '';

      position: absolute;

      top: 8px;
      left: 50%;

      width: 4px;
      height: 10px;

      background: white;

      border-radius: 10px;

      transform: translateX(-50%);

      animation: wheel 1.5s infinite;
    }

    .arrow{
      font-size: 30px;
      color: white;
    }

    @keyframes wheel{
      from{
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      to{
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }
    }

    @keyframes bounce{
      0%,100%{
        transform: translateX(-50%) translateY(0);
      }

      50%{
        transform: translateX(-50%) translateY(8px);
      }
    }

    /* ===== SEGUNDA PARTE ===== */
    .content{
      min-height: 100vh;

      background:
      linear-gradient(to bottom,
      #07110b,
      #0d1b12);

      padding: 120px 10%;
    }

    .mini-line{
      width: 120px;
      height: 2px;

      background: #8fd49d;

      margin: auto;
      margin-bottom: 20px;
    }

    .leaf{
      font-size: 28px;
      text-align: center;

      margin-bottom: 20px;
    }

    .content h2{
      font-family: 'Bebas';

      letter-spacing: 3px;

      text-align: center;

      font-size: 3.5rem;

      margin-bottom: 40px;

      color: #a7d7a8;
    }

    .content p{
      font-size: 1.2rem;

      line-height: 2;

      color: #d9e6da;

      max-width: 900px;

      margin: auto;

      text-align: center;
    }

  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-bg" id="bg"></div>

    <div class="green-glow"></div>

    <!-- PARTÍCULAS -->
    <div class="particles">

      <div class="particle" style="left:10%; animation-duration: 12s;"></div>
      <div class="particle" style="left:20%; animation-duration: 16s;"></div>
      <div class="particle" style="left:35%; animation-duration: 14s;"></div>
      <div class="particle" style="left:50%; animation-duration: 18s;"></div>
      <div class="particle" style="left:70%; animation-duration: 13s;"></div>
      <div class="particle" style="left:85%; animation-duration: 17s;"></div>

    </div>

    <!-- TEXTO -->
    <div class="hero-content">

      <h1 class="hero-title" id="title">

        <div class="line1">
          PRODUZIR HOJE SEM
        </div>

        <div class="line2">
          DESTRUIR O AMANHÃ
        </div>

      </h1>

    </div>

    <!-- INDICADOR -->
    <div class="scroll-indicator">

      <div class="mouse"></div>

      <div class="arrow">
        ↓
      </div>

    </div>

  </section>

  <!-- SEGUNDA PARTE -->
  <section class="content">

    <div class="mini-line"></div>

    <div class="leaf">
      🌱
    </div>

    <h2>
      AGRO FORTE, FUTURO SUSTENTÁVEL
    </h2>

    <p>
      O agronegócio sustentável busca unir produção e preservação ambiental,
      utilizando tecnologia, inovação e responsabilidade ecológica para garantir
      alimento, desenvolvimento e proteção da natureza para as próximas gerações.
    </p>

  </section>

  <script>

    const bg = document.getElementById("bg");
    const title = document.getElementById("title");

    window.addEventListener("scroll", () => {

      let scroll = window.scrollY;

      /* FUNDO SUMINDO */
      bg.style.opacity = 1 - scroll / 700;

      /* LEVE ZOOM */
      bg.style.transform = `scale(${1.03 + scroll / 8000})`;

      /* TEXTO SUBINDO */
      title.style.transform = `translateY(-${scroll * 0.35}px)`;

      /* TEXTO DESAPARECENDO */
      title.style.opacity = 1 - scroll / 500;

    });

  </script>

</body>
</html>
