<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agro Forte</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: #0f1f14;
      overflow-x: hidden;
      color: white;
    }

    /* PRIMEIRA TELA */
    .hero{
      position: relative;
      height: 200vh;
    }

    .hero-bg{
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;

      background:
        linear-gradient(rgba(18, 40, 24, 0.75), rgba(18, 40, 24, 0.75)),
        url("img.jpg");

      background-size: cover;
      background-position: center;

      z-index: -1;

      transition: opacity 0.2s ease;
    }

    .hero-content{
      position: sticky;
      top: 0;

      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      text-align: center;
      padding: 20px;
    }

    .hero-title{
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: bold;
      max-width: 900px;

      line-height: 1.2;

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    /* SEGUNDA PARTE */
    .content{
      min-height: 100vh;
      background: #0f1f14;

      padding: 100px 10%;
    }

    .content h2{
      font-size: 3rem;
      margin-bottom: 30px;
      color: #a7d7a8;
    }

    .content p{
      font-size: 1.2rem;
      line-height: 1.8;
      color: #d9e6da;
    }
  </style>
</head>
<body>

  <section class="hero">

    <div class="hero-bg" id="bg"></div>

    <div class="hero-content">
      <h1 class="hero-title" id="title">
        Produzir hoje sem destruir o amanhã
      </h1>
    </div>

  </section>

  <section class="content">
    <h2>Agro Forte, Futuro Sustentável</h2>

    <p>
      O agronegócio sustentável busca unir produção e preservação ambiental,
      utilizando tecnologia, inovação e responsabilidade ecológica para garantir
      alimento, desenvolvimento e proteção da natureza para as próximas gerações.
    </p>
  </section>

  <script>
    const bg = document.getElementById("bg");
    const title = document.getElementById("title");

    window.addEventListener("scroll", () => {

      let scroll = window.scrollY;

      // Fade da imagem
      bg.style.opacity = 1 - scroll / 700;

      // Texto subindo
      title.style.transform = `translateY(-${scroll * 0.4}px)`;

      // Texto desaparecendo aos poucos
      title.style.opacity = 1 - scroll / 500;

    });
  </script>

</body>
</html>
