<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano ABC & Sistema Indoor</title>
    <style>
        /* Configurações Gerais e Rolagem Suave */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #D9BBFA; /* fundo ROXO clarinho */
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Barra de Navegação (Aba Superior) */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #B177ED; /* Tom de ROXO ligeiramente mais escuro para destaque */
            padding: 15px 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Botões Brancos */
        .nav-btn {
            background-color: #FFFFFF;
            color: #000000; /* Texto em preto */
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none; /* Remove sublinhado de link */
            transition: all 0.3s ease;
        }

        /* Efeito ao passar o mouse (Hover) */
        .nav-btn:hover {
            background-color: #B9A1D1;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

            padding: 90px 40px 40px 40px; /* Reduzido o padding superior para o título subir */
            min-height: 100vh;
