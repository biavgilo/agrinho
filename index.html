<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agro Forte</title>

  <style>

    /* ===== FONTE PERSONALIZADA ===== */
    @font-face {
      font-family: 'Bebas';
      src: url('fontes/bebas.ttf') format('truetype');
    }

    /* ===== CONFIGURAÇÕES GERAIS ===== */
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background: #0f1f14;
      overflow-x: hidden;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ===== PRIMEIRA TELA ===== */
    .hero{
      position: relative;
      height: 200vh;
    }

    /* FUNDO */
    .hero-bg{
      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100vh;

      background-image:
        linear-gradient(rgba(15, 31, 20, 0.72), rgba(15, 31, 20, 0.72)),
        url("img.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      z-index: -1;

      transition: opacity 0.2s ease;
    }

    /* CONTEÚDO CENTRAL */
    .hero-content{
      position: sticky;
      top: 0;

      width: 100%;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      text-align: center;
      padding: 20px;
    }

    /* FRASE PRINCIPAL */
    .hero-title{
      font-family: 'Bebas';

      font-size: clamp(3rem, 9vw, 8rem);

      text-transform: uppercase;

      letter-spacing: 6px;

      line-height: 1.1;

      max-width: 1100px;

      color: white;

      text-shadow:
        0 0 20px rgba(0,0,0,0.7),
        0 0 40px rgba(0,0,0,0.5);

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    /* ===== SEGUNDA PARTE ===== */
    .content{
      min-height: 100vh;

      background: #0f1f14;

      padding: 120px 10%;
    }

    .content h2{
      font-size: 3rem;
      margin-bottom: 30px;
      color: #a7d7a8;
    }

    .content p{
      font-size: 1.2rem;
      line-height: 1.8;
      color: #d9e6da;

      max-width: 900px;
    }

  </style>
</head>
<body>

  <!-- PRIMEIRA TELA -->
  <section class="hero">

    <div class="hero-bg" id="bg"></div>

    <div class="hero-content">

      <h1 class="hero-title" id="title">
        Produzir Hoje <br>
        Sem Destruir O Amanhã
      </h1>

    </div>

  </section>

  <!-- SEGUNDA PARTE -->
  <section class="content">

    <h2>Agro Forte, Futuro Sustentável</h2>

    <p>
      O agronegócio sustentável busca unir produção e preservação ambiental,
      utilizando tecnologia, inovação e responsabilidade ecológica para garantir
      alimento, desenvolvimento e proteção da natureza para as próximas gerações.
    </p>

  </section>

  <script>

    const bg = document.getElementById("bg");
    const title = document.getElementById("title");

    window.addEventListener("scroll", () => {

      let scroll = window.scrollY;

      /* FUNDO DESAPARECENDO */
      bg.style.opacity = 1 - scroll / 700;

      /* TEXTO SUBINDO */
      title.style.transform = `translateY(-${scroll * 0.4}px)`;

      /* TEXTO SUMINDO */
      title.style.opacity = 1 - scroll / 500;

    });

  </script>

</body>
</html>
